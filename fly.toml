# Fly.io app config. Edit `app` to the name you pick during `fly launch`
# if "welux-finance" is already taken on Fly's global namespace.
app = "welux-finance"
primary_region = "lhr"   # London — closest to Welux + Supabase eu-west-2

[build]

[http_service]
  internal_port = 8501
  force_https = true
  # Scale to zero when idle so a single-user finance dashboard costs ~£0/mo.
  # First request after idle takes ~5s for the machine to wake up.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/_stcore/health"

[[vm]]
  memory = "512mb"        # pandas + Streamlit comfortably; 256mb is borderline
  cpu_kind = "shared"
  cpus = 1
